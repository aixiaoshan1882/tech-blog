version: '3.8'

services:
  # 后端 API 服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tech-blog-backend
    ports:
      - "8787:8787"
    environment:
      - DATABASE_URL=postgresql://blog:blogpassword@postgres:5432/blog
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=your-secret-key-change-in-production
      - CORS_ORIGINS=http://localhost:3000
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - blog-network

  # 前端 Web 服务
  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile
    container_name: tech-blog-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - blog-network

  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: tech-blog-db
    environment:
      - POSTGRES_USER=blog
      - POSTGRES_PASSWORD=blogpassword
      - POSTGRES_DB=blog
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - blog-network

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: tech-blog-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - blog-network

  # Nginx 反向代理 (可选)
  nginx:
    image: nginx:alpine
    container_name: tech-blog-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - blog-network
    profiles:
      - with-nginx

volumes:
  postgres_data:
  redis_data:

networks:
  blog-network:
    driver: bridge
