name = "tech-blog-api"
main = "src/main.py"
compatibility_date = "2024-01-01"

[vars]
JWT_SECRET = "replace-this-with-a-secure-secret-key"
JWT_EXPIRE_DAYS = "7"

# 本地开发使用的 SQLite
# 生产环境使用 D1
[env]
DB_PATH = { preset = "local" }

# 部署时取消注释并配置 D1
# [[d1_databases]]
# binding = "DB"
# database_name = "tech-blog-db"
# database_id = "your-database-id"