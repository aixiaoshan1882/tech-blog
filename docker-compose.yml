version: '3.8'

services:
  # 后端 API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8787:8787"
    volumes:
      - ./data:/app/data
    environment:
      - DB_PATH=/app/data/tech-blog.db
      - JWT_SECRET=your-secure-secret-key-here
      - CORS_ORIGINS=http://localhost:5173,https://yourdomain.com
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8787/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 前端 (开发模式)
  frontend:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ./front:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend

  # Redis (可选 - 用于缓存)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:
